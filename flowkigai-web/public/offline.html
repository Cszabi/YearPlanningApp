<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline — Flowkigai</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
        background: #FAFAF8;
        color: #1A1A2E;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .container {
        text-align: center;
        max-width: 360px;
      }
      .icon {
        font-size: 64px;
        margin-bottom: 24px;
      }
      h1 {
        font-size: 22px;
        font-weight: 700;
        margin-bottom: 12px;
        color: #0D6E6E;
      }
      p {
        font-size: 15px;
        color: #6B7280;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">🌿</div>
      <h1>You're offline</h1>
      <p>Flowkigai will be back when you reconnect.</p>
    </div>
  </body>
</html>
