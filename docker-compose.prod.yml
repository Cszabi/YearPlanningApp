services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  api:
    build:
      context: .
      dockerfile: src/YearPlanningApp.API/Dockerfile
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=flowkigai;Username=flowkigai_user;Password=${POSTGRES_PASSWORD}
      - ConnectionStrings__Redis=redis:6379
      - Jwt__Issuer=flowkigai
      - Jwt__Audience=flowkigai-web
      - Jwt__SecretKey=${JWT_SECRET_KEY}
      - Smtp__Host=${SMTP_HOST:-smtp.example.com}
      - Smtp__Port=${SMTP_PORT:-587}
      - Smtp__UseSsl=${SMTP_USE_SSL:-false}
      - Smtp__UserName=${SMTP_USER:-}
      - Smtp__Password=${SMTP_PASSWORD:-}
      - Smtp__FromAddress=${SMTP_FROM_ADDRESS:-noreply@flowkigai.com}
      - Smtp__FromName=${SMTP_FROM_NAME:-Flowkigai}
      - Cors__AllowedOrigins__0=https://flowkigai.com
      - Cors__AllowedOrigins__1=https://www.flowkigai.com
      - Cors__AllowedOrigins__2=app://braini
      - App__BaseUrl=https://flowkigai.com
      - Vapid__Subject=mailto:admin@flowkigai.com
      - Vapid__PublicKey=${VAPID_PUBLIC_KEY}
      - Vapid__PrivateKey=${VAPID_PRIVATE_KEY}
      - Anthropic__ApiKey=${ANTHROPIC_API_KEY}
      - Openverse__ClientId=${OPENVERSE_CLIENT_ID}
      - Openverse__ClientSecret=${OPENVERSE_CLIENT_SECRET}
    volumes:
      - dataprotection_keys:/root/.aspnet/DataProtection-Keys
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: flowkigai
      POSTGRES_USER: flowkigai_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
  dataprotection_keys:
